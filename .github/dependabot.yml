version: 2
updates:
  # Maintain dependencies for GitHub Actions
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      cron: "0 4 15 * *"
      timezone: Europe/Berlin

  - package-ecosystem: npm
    directories:
      - "/"
      - "/src-widgets"
    schedule:
      cron: "0 4 16 * *"
      timezone: Europe/Berlin
    open-pull-requests-limit: 15
    versioning-strategy: increase
