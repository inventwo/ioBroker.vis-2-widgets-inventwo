name: Update package-lock.json

on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-lockfiles:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Use Node.js 24.x
        uses: actions/setup-node@v6
        with:
          node-version: '24.x'

      - name: Ensure npm is up to date
        run: npm install -g npm@9

      - name: Install and update lockfile (root)
        run: |
          npm install
          git add package-lock.json || true

      - name: Install and update lockfile (src-widgets)
        run: |
          cd src-widgets
          npm install
          git add package-lock.json || true

      - name: Commit changes
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Stage lockfiles (safe even if missing)
          git add package-lock.json src-widgets/package-lock.json || true
          # Debug: show staged files and diffs
          echo "Staged files:" >&2
          git diff --cached --name-only --exit-code || git diff --cached --name-only --no-pager | tee changed-files.txt
          STAGED=$(git diff --cached --name-only)
          if [ -z "$STAGED" ]; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "changed_files=" >> $GITHUB_OUTPUT
            echo "No lockfile changes"
          else
            git commit -m "chore: update package-lock.json (regenerated on ubuntu)" || true
            # set outputs for CI visibility
            echo "changed=true" >> $GITHUB_OUTPUT
            # join file names with comma
            CHANGED_FILES=$(echo "$STAGED" | paste -sd "," -)
            echo "changed_files=$CHANGED_FILES" >> $GITHUB_OUTPUT
            echo "Committed files: $CHANGED_FILES"
          fi

      - name: Push branch and create PR
        if: steps.commit.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore: update package-lock.json (regenerated on ubuntu)'
          branch: update-lockfiles-${{ github.run_id }}
          title: 'chore: update package-lock.json (regenerated on ubuntu)'
          body: |
            This pull request regenerates package-lock.json files on an ubuntu runner so that
            CI runners (linux) have the platform-specific optional dependencies present in the lockfile.

            If this fixes CI, please review & merge.
          labels: 'locked, automation'
